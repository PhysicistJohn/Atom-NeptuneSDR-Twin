name: twin-contracts

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  reference-and-cosim:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install the twin
        run: python -m pip install -e .
      - name: Compile every Python source
        run: python -m compileall -q src scripts tests cosim/tests
      - name: Run reference and protocol tests
        run: python -m unittest discover -s tests -v
      - name: Run QEMU source-contract tests
        run: python -m unittest discover -s cosim/tests -v
      - name: Check shell syntax
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done
      - name: Exercise non-mutating command paths
        run: |
          neptune-twin contracts
          neptune-twin fft-plan
          neptune-twin serve --dry-run
          neptune-twin usbip-serve --dry-run
          neptune-twin appliance --dry-run
          ./scripts/linux_usb_gadget.sh >/dev/null
      - name: Reject whitespace errors
        run: git diff --check
