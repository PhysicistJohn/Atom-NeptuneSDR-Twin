name: twin-contracts

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      full_acceptance:
        description: Build QEMU and run the firmware-executing zero-skip gate
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Atom-NeptuneSDR-Twin
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: Atom-NeptuneSDR-Twin
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-DSP
          ref: v0.1.0
          path: Atom-DSP
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install the twin
        run: python -m pip install -e .
      - name: Run source gate (exactly 15 live-QEMU skips)
        run: scripts/check.sh

  full-firmware-gate:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_acceptance }}
    runs-on: macos-15
    timeout-minutes: 120
    defaults:
      run:
        working-directory: Atom-NeptuneSDR-Twin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: Atom-NeptuneSDR-Twin
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-DSP
          ref: v0.1.0
          path: Atom-DSP
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Require the supported native QEMU build host
        run: test "$(uname -s)-$(uname -m)" = Darwin-arm64
      - name: Install the twin
        run: python -m pip install -e .
      - name: Run full zero-skip firmware acceptance
        run: scripts/accept_virtual_twin.sh
      - name: Upload content-addressed acceptance evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: full-acceptance-${{ github.sha }}
          path: Atom-NeptuneSDR-Twin/.cache/acceptance/runs
          if-no-files-found: error
